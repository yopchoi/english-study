const player = document.getElementById('player');
const container = document.getElementById('script');
segments.forEach((seg, i) => {
  const div = document.createElement('div');
  div.className = 'segment';
  div.id = 'seg-' + i;
  div.innerHTML = `<span class="time">${formatTime(seg.start)}</span><span class="text">${seg.text}</span>`;
  div.onclick = () => { player.currentTime = seg.start; player.play(); };
  container.appendChild(div);
});
function formatTime(s) {
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}
player.addEventListener('timeupdate', () => {
  const current = player.currentTime;
  segments.forEach((seg, i) => {
    const next = segments[i+1];
    const el = document.getElementById('seg-' + i);
    if (current >= seg.start && (!next || current < next.start)) {
      el.classList.add('active');
      el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    } else { el.classList.remove('active'); }
  });
});
